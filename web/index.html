<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zig Image Carousel</title>
    <style>
        /* Full-viewport canvas with dark background.
           touch-action:none prevents browser gestures so the carousel
           can handle pointer events directly. */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0f;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
    </style>
</head>
<body>
    <canvas id="carousel-canvas"></canvas>
    <script type="module" src="host.js"></script>
</body>
</html>
